<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OniShop — Mua sắm cùng Oni</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #fff9f7;
  --card: #ffffff;
  --bdr:  #f0e8e4;
  --acc:  #ee4d2d;
  --ac2:  #ff7849;
  --acl:  #fff3f0;
  --txt:  #1a0d08;
  --t2:   #9a8880;
  --t3:   #c5b8b3;
  --r:    14px;
  --f:    'Be Vietnam Pro', sans-serif;
  --sh:   0 2px 20px rgba(238,77,45,.06);
  --shh:  0 12px 44px rgba(238,77,45,.14);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--f);background:var(--bg);color:var(--txt);min-height:100vh;}

/* HEADER */
header{background:#fff;border-bottom:2px solid var(--bdr);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(238,77,45,.05);}
.hi{max-width:1280px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:16px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-ic{width:38px;height:38px;background:linear-gradient(135deg,var(--acc),var(--ac2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 4px 14px rgba(238,77,45,.35);}
.logo-nm{font-size:20px;font-weight:900;color:var(--txt);}
.logo-nm em{color:var(--acc);font-style:normal;}
.hsearch{flex:1;max-width:460px;display:flex;align-items:center;gap:10px;background:var(--bg);border:2px solid var(--bdr);border-radius:50px;padding:10px 18px;transition:all .18s;}
.hsearch:focus-within{border-color:var(--acc);background:#fff;box-shadow:0 0 0 3px rgba(238,77,45,.08);}
.hsearch input{background:none;border:none;outline:none;font-family:var(--f);font-size:14px;color:var(--txt);flex:1;}
.hsearch input::placeholder{color:var(--t2);}

/* HERO */
.hero{background:linear-gradient(145deg,#fff3f0 0%,#fff8f5 55%,#f5f0ff 100%);padding:48px 24px 36px;text-align:center;border-bottom:2px solid var(--bdr);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(238,77,45,.08),transparent 65%);top:-150px;right:-120px;pointer-events:none;}
.hero-tag{display:inline-flex;align-items:center;gap:7px;background:rgba(238,77,45,.08);color:var(--acc);font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:50px;margin-bottom:18px;}
.hero h1{font-size:clamp(28px,5.5vw,52px);font-weight:900;letter-spacing:-1.5px;line-height:1.08;margin-bottom:12px;}
.hero h1 em{color:var(--acc);font-style:normal;display:block;}
.hero p{font-size:15px;color:var(--t2);max-width:400px;margin:0 auto;}

/* CATEGORY PILLS */
.cat-bar{
  background:#fff;
  border-bottom:2px solid var(--bdr);
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  -ms-overflow-style:none;
  -webkit-overflow-scrolling:touch;
  cursor:grab;
}
.cat-bar:active{cursor:grabbing;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-inner{
  padding:14px 24px;
  display:inline-flex; /* inline-flex so bar scrolls naturally */
  gap:8px;
  min-width:100%;
}
.cat-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;
  cursor:pointer;border:2px solid var(--bdr);background:#fff;color:var(--t2);
  transition:border-color .18s,color .18s,background .18s,box-shadow .18s;
  user-select:none;-webkit-user-select:none;
  flex-shrink:0;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
  pointer-events:auto;
}
.cat-pill:hover{border-color:var(--acc);color:var(--acc);}
.cat-pill.on{background:var(--acc);border-color:var(--acc);color:#fff;box-shadow:0 4px 14px rgba(238,77,45,.3);}
@media(max-width:767px){
  .cat-bar{
    -webkit-mask-image:linear-gradient(to right,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%);
    mask-image:linear-gradient(to right,transparent 0,#000 20px,#000 calc(100% - 20px),transparent 100%);
  }
  .cat-inner{padding:12px 20px;}
}

/* SHOP */
.wrap{max-width:1280px;margin:0 auto;padding:28px 24px 48px;}
.sbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:14px;flex-wrap:wrap;}
.rcnt{font-size:14px;font-weight:600;color:var(--t2);}
.rcnt strong{color:var(--txt);}
.sopts{display:flex;align-items:center;gap:10px;}
.ssel{background:var(--card);border:2px solid var(--bdr);border-radius:10px;padding:9px 14px;font-family:var(--f);font-size:13px;font-weight:600;color:var(--txt);outline:none;cursor:pointer;transition:border-color .18s;}
.ssel:focus{border-color:var(--acc);}
.vbtns{display:flex;gap:4px;}
.vbtn{width:36px;height:36px;border-radius:8px;border:2px solid var(--bdr);background:var(--card);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.vbtn.on{background:var(--acc);border-color:var(--acc);color:#fff;}

/* GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}

/* CARD */
.card{background:var(--card);border:2px solid var(--bdr);border-radius:var(--r);overflow:hidden;transition:all .22s;box-shadow:var(--sh);}
.card:hover{transform:translateY(-5px);box-shadow:var(--shh);border-color:rgba(238,77,45,.2);}
.cimg{aspect-ratio:1;overflow:hidden;background:#fafafa;position:relative;cursor:pointer;}
.cimg img{width:100%;height:100%;object-fit:cover;transition:transform .32s;display:block;}
.card:hover .cimg img{transform:scale(1.07);}
.cnoimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:46px;background:linear-gradient(135deg,#fff0ec,#fff8f5);}
.cbody{padding:12px;}
.ccat{margin-bottom:6px;}
.ccat-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
/* category badge colors */
.b-quan-nam{background:rgba(52,152,219,.1);color:#3498db;}
.b-quan-nu{background:rgba(231,76,60,.1);color:#e74c3c;}
.b-ao-nam{background:rgba(46,204,113,.1);color:#27ae60;}
.b-ao-nu{background:rgba(241,196,15,.1);color:#d4a017;}
.b-giay{background:rgba(155,89,182,.1);color:#8e44ad;}
.b-dep{background:rgba(230,126,34,.1);color:#d35400;}
.b-my-pham{background:rgba(238,77,45,.1);color:#ee4d2d;}
.b-do-an-vat{background:rgba(26,188,156,.1);color:#16a085;}
.b-set{background:rgba(255,120,73,.1);color:#ff7849;}
.b-chan-vay{background:rgba(253,167,87,.1);color:#d4870a;}
.cname{font-size:13px;font-weight:700;line-height:1.45;margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cbuy{display:block;width:100%;padding:10px;background:linear-gradient(135deg,var(--acc),var(--ac2));color:#fff;font-family:var(--f);font-size:13px;font-weight:800;border:none;border-radius:9px;cursor:pointer;text-decoration:none;text-align:center;transition:all .18s;}
.cbuy:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(238,77,45,.4);}

/* LIST */
.plist{display:flex;flex-direction:column;gap:12px;}
.lcard{background:var(--card);border:2px solid var(--bdr);border-radius:var(--r);display:flex;gap:16px;padding:14px;transition:all .2s;box-shadow:var(--sh);}
.lcard:hover{border-color:rgba(238,77,45,.2);box-shadow:var(--shh);}
.limg{width:88px;height:88px;border-radius:10px;object-fit:cover;background:#fafafa;flex-shrink:0;display:block;}
.lnoimg{width:88px;height:88px;border-radius:10px;background:linear-gradient(135deg,#fff0ec,#fff8f5);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
.lbody{flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px;}
.lname{font-size:15px;font-weight:700;line-height:1.4;}
.lbuy{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;background:linear-gradient(135deg,var(--acc),var(--ac2));color:#fff;font-family:var(--f);font-size:13px;font-weight:800;border-radius:9px;text-decoration:none;transition:all .18s;align-self:flex-start;}
.lbuy:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(238,77,45,.4);}

/* SKELETON */
.skel{background:var(--card);border:2px solid var(--bdr);border-radius:var(--r);overflow:hidden;}
.skel-i{aspect-ratio:1;background:linear-gradient(90deg,#f5ede9 25%,#fdf5f2 50%,#f5ede9 75%);background-size:200%;animation:sh 1.4s infinite;}
.skel-b{padding:12px;}
.skel-l{height:10px;border-radius:5px;background:linear-gradient(90deg,#f5ede9 25%,#fdf5f2 50%,#f5ede9 75%);background-size:200%;animation:sh 1.4s infinite;margin-bottom:8px;}
.skel-l.s{width:55%;}
.skel-n{height:32px;border-radius:8px;background:linear-gradient(90deg,#f5ede9 25%,#fdf5f2 50%,#f5ede9 75%);background-size:200%;animation:sh 1.4s infinite;}
@keyframes sh{to{background-position:-200% 0;}}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;}
.empty-ic{font-size:58px;margin-bottom:14px;}
.empty h3{font-size:20px;font-weight:800;margin-bottom:8px;}
.empty p{font-size:14px;color:var(--t2);}
.rst-btn{margin-top:16px;display:inline-flex;align-items:center;gap:7px;padding:10px 20px;background:var(--acc);color:#fff;font-family:var(--f);font-size:13px;font-weight:800;border:none;border-radius:10px;cursor:pointer;}
.rst-btn:hover{background:#d63d1f;}

/* PAGINATION */
.pagiwrap{display:flex;justify-content:center;gap:8px;padding:40px 0 16px;}
.pb{min-width:40px;height:40px;border-radius:10px;border:2px solid var(--bdr);background:var(--card);color:var(--t2);cursor:pointer;font-family:var(--f);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 12px;transition:all .18s;}
.pb:hover,.pb.on{background:var(--acc);border-color:var(--acc);color:#fff;}
.pb:disabled{opacity:.35;cursor:default;}

/* FOOTER */
footer{background:var(--card);border-top:2px solid var(--bdr);padding:28px 24px;text-align:center;color:var(--t2);font-size:13px;margin-top:32px;}
footer strong{color:var(--txt);}

/* ── RESPONSIVE ───────────────────────────── */

/* Large desktop 1400px+ */
@media(min-width:1400px){
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;}
  .hero{padding:64px 24px 52px;}
}

/* Tablet landscape 768–1023px */
@media(max-width:1023px){
  .hi{padding:0 20px;}
  .hsearch{max-width:360px;}
  .wrap{padding:24px 20px 40px;}
  .cat-inner{padding:12px 20px;}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;}
  .hero{padding:44px 20px 34px;}
  .limg,.lnoimg{width:80px;height:80px;}
}

/* Tablet portrait 600–767px */
@media(max-width:767px){
  .hi{padding:0 16px;height:58px;gap:12px;}
  .logo-nm{font-size:18px;}
  .logo-ic{width:34px;height:34px;font-size:15px;}
  .hsearch{max-width:none;padding:9px 14px;}
  .hero{padding:36px 16px 28px;}
  .hero p{font-size:14px;}
  .cat-inner{padding:10px 16px;gap:7px;}
  .cat-pill{padding:7px 13px;font-size:12px;}
  .wrap{padding:20px 16px 36px;}
  .ssel{font-size:12px;padding:8px 12px;}
  .pgrid{grid-template-columns:repeat(3,1fr);gap:12px;}
  .cbody{padding:10px;}
  .cname{font-size:12px;}
  .cbuy{padding:8px;font-size:12px;}
  .lcard{padding:12px;gap:12px;}
  .limg,.lnoimg{width:76px;height:76px;}
  .lname{font-size:14px;}
  .lbuy{padding:8px 16px;font-size:12px;}
  .pb{min-width:36px;height:36px;}
  footer{padding:22px 16px;font-size:12px;}
}

/* Mobile 480–599px */
@media(max-width:599px){
  .pgrid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .sbar{gap:10px;}
}

/* Small mobile 320–479px */
@media(max-width:479px){
  .hi{padding:0 12px;height:54px;}
  .logo-nm{font-size:16px;}
  .hsearch{padding:8px 12px;}
  .hero{padding:26px 12px 22px;}
  .hero h1{letter-spacing:-.5px;}
  .hero p{font-size:13px;}
  .cat-inner{padding:9px 12px;gap:6px;}
  .cat-pill{padding:6px 11px;font-size:11px;}
  .wrap{padding:14px 10px 28px;}
  .sbar{flex-direction:column;align-items:flex-start;}
  .sopts{width:100%;justify-content:space-between;}
  .ssel{flex:1;}
  .pgrid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .cbody{padding:8px;}
  .cname{font-size:11px;margin-bottom:7px;}
  .cbuy{padding:8px;font-size:11px;}
  .ccat-badge{font-size:9px;}
  .limg,.lnoimg{width:68px;height:68px;}
  .lname{font-size:13px;}
  .pb{min-width:32px;height:32px;font-size:12px;}
  .pagiwrap{gap:4px;}
  .empty{padding:50px 12px;}
  .empty-ic{font-size:46px;}
  .empty h3{font-size:17px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hi">
    <a class="logo" href="index.html">
      <div class="logo-ic">🛒</div>
      <div class="logo-nm">Oni<em>Shop</em></div>
    </a>
    <div class="hsearch">
      <span style="color:var(--t2);font-size:15px">🔍</span>
      <input type="text" id="hsearch" placeholder="Tìm sản phẩm..." oninput="onSearch()">
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag">✨ OniShop</div>
  <h1>Mua sắm<em>cùng Oni</em></h1>
  <p>Những sản phẩm mình đang dùng và yêu thích — click để mua nhé!</p>

<!-- CATEGORY BAR -->
<div class="cat-bar">
  <div class="cat-inner" id="catBar">
    <div class="cat-pill on" data-cat="">🛍️ Tất cả</div>
    <div class="cat-pill" data-cat="quan-nam">👖 Quần Nam</div>
    <div class="cat-pill" data-cat="quan-nu">👗 Quần Nữ</div>
    <div class="cat-pill" data-cat="ao-nam">👔 Áo Nam</div>
    <div class="cat-pill" data-cat="ao-nu">👚 Áo Nữ</div>
    <div class="cat-pill" data-cat="giay">👟 Giày</div>
    <div class="cat-pill" data-cat="dep">🩴 Dép</div>
    <div class="cat-pill" data-cat="my-pham">💄 Mỹ phẩm</div>

<!-- SHOP -->
<div class="wrap">

      <select class="ssel" id="sortSel" onchange="applyAll()">

        <option value="az">Tên A → Z</option>

      </select>
      <div class="vbtns">
        <button class="vbtn on" id="vG" onclick="setView('grid')" title="Lưới">⊞</button>

      <div class="skel"><div class="skel-i"></div><div class="skel-b"><div class="skel-l"></div><div class="skel-l s"></div><div class="skel-n"></div></div></div>
      <div class="skel"><div class="skel-i"></div><div class="skel-b"><div class="skel-l"></div><div class="skel-l s"></div><div class="skel-n"></div></div></div>

      <div class="skel"><div class="skel-i"></div><div class="skel-b"><div class="skel-l"></div><div class="skel-l s"></div><div class="skel-n"></div></div></div>
      <div class="skel"><div class="skel-i"></div><div class="skel-b"><div class="skel-l"></div><div class="skel-l s"></div><div class="skel-n"></div></div></div>
      <div class="skel"><div class="skel-i"></div><div class="skel-b"><div class="skel-l"></div><div class="skel-l s"></div><div class="skel-n"></div></div></div>
    </div>
  </div>
  <div class="pagiwrap" id="pagiwrap"></div>
</div>

<footer>Được tuyển chọn bởi <strong>OniShop</strong> 🛒</footer>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const cfg = {
  apiKey: "AIzaSyDug7Sk2ubQcWqAEsiY1LxzRgm3w4Ng4Vs",
  authDomain: "onishop.firebaseapp.com", projectId: "onishop",
  storageBucket: "onishop.firebasestorage.app",
  messagingSenderId: "219485776565",
  appId: "1:219485776565:web:78365146bea263d794ecfc"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);

window._prods = [];

try {
  const q    = query(collection(db,'products'), orderBy('createdAt','desc'));
  const snap = await getDocs(q);
  window._prods = snap.docs.map(d=>({id:d.id,...d.data()}));
} catch {
  try {
    const snap = await getDocs(collection(db,'products'));
    window._prods = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) { console.error('Firebase error:', e); window._prods = []; }
}
window.initShop();
</script>

<script>
const CATS = {
  'quan-nam': ['👖','Quần Nam','b-quan-nam'],
  'quan-nu':  ['👗','Quần Nữ','b-quan-nu'],
  'ao-nam':   ['👔','Áo Nam','b-ao-nam'],
  'ao-nu':    ['👚','Áo Nữ','b-ao-nu'],
  'giay':     ['👟','Giày','b-giay'],
  'dep':      ['🩴','Dép','b-dep'],
  'my-pham':  ['💄','Mỹ phẩm','b-my-pham'],
  'do-an-vat':['🍿','Đồ ăn vặt','b-do-an-vat'],
  'set':      ['🎁','Set','b-set'],
  'chan-vay': ['👗','Chân váy','b-chan-vay'],
};

var all=[], filtered=[], pg=1, PER=20, view='grid', sq='', activeCat='';

function initShop() {
  all = window._prods || [];
  // Wire category pills
  document.querySelectorAll('.cat-pill').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('on'));
      el.classList.add('on');
      activeCat = el.dataset.cat;
      pg = 1; applyAll();
      // Scroll pill into view inside the bar (mobile swipe)
      el.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
      // Scroll page to products
      setTimeout(()=>document.querySelector('.wrap').scrollIntoView({behavior:'smooth', block:'start'}), 100);
    });
  });
  applyAll();
}
window.initShop = initShop;

function onSearch() { sq = document.getElementById('hsearch').value.toLowerCase(); pg=1; applyAll(); }
window.onSearch = onSearch;

function applyAll() {
  const sort = document.getElementById('sortSel').value;
  filtered = all.filter(p => {
    const ms = !sq       || (p.name||'').toLowerCase().includes(sq);
    const mc = !activeCat || p.category === activeCat;
    return ms && mc;
  });
  if(sort==='az') filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||'','vi'));
  else if(sort==='za') filtered.sort((a,b)=>(b.name||'').localeCompare(a.name||'','vi'));
  render();
}
window.applyAll = applyAll;

function render() {
  const total = filtered.length;
  const slice = filtered.slice((pg-1)*PER, pg*PER);
  const wrap  = document.getElementById('products');

  document.getElementById('rcnt').innerHTML = `<strong>${total}</strong> sản phẩm`;

  if(!slice.length) {
    wrap.innerHTML = `
      <div class="empty">
        <div class="empty-ic">🔍</div>
        <h3>Không tìm thấy sản phẩm</h3>
        <p>Thử danh mục khác hoặc từ khoá khác nhé</p>
        <button class="rst-btn" onclick="clearAll()">↩️ Xem tất cả</button>
      </div>`;
    document.getElementById('pagiwrap').innerHTML='';
    return;
  }

  if(view==='grid') {
    wrap.innerHTML = `<div class="pgrid">${slice.map(cGrid).join('')}</div>`;
  } else {
    wrap.innerHTML = `<div class="plist">${slice.map(cList).join('')}</div>`;
  }
  renderPagi(total);
}

function catBadge(cat) {
  const c = CATS[cat];
  if(!c) return '';
  return `<div class="ccat"><span class="ccat-badge ${c[2]}">${c[0]} ${c[1]}</span></div>`;
}

function cGrid(p) {
  return `
    <div class="card" ${p.link?`onclick="window.open('${p.link}','_blank')"`:'style="cursor:default"'}>
      <div class="cimg">
        ${p.image
          ? `<img src="${p.image}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=cnoimg>🛍️</div>'">`
          : `<div class="cnoimg">🛍️</div>`}
      </div>
      <div class="cbody">
        ${catBadge(p.category)}
        <div class="cname">${x(p.name||'Sản phẩm')}</div>
        ${p.link
          ? `<a class="cbuy" href="${p.link}" target="_blank" onclick="event.stopPropagation()">🛒 Mua ngay</a>`
          : `<button class="cbuy" disabled style="opacity:.4;cursor:not-allowed">Chưa có link</button>`}
      </div>
    </div>`;
}

function cList(p) {
  return `
    <div class="lcard">
      ${p.image
        ? `<img src="${p.image}" class="limg" loading="lazy" onerror="this.outerHTML='<div class=lnoimg>🛍️</div>'">`
        : `<div class="lnoimg">🛍️</div>`}
      <div class="lbody">
        ${catBadge(p.category)}
        <div class="lname">${x(p.name||'Sản phẩm')}</div>
        ${p.link
          ? `<a class="lbuy" href="${p.link}" target="_blank">🛒 Mua ngay</a>`
          : `<span style="font-size:12px;color:var(--t2)">Chưa có link</span>`}
      </div>
    </div>`;
}

function renderPagi(total) {
  const pages = Math.ceil(total/PER), bar = document.getElementById('pagiwrap');
  bar.innerHTML = '';
  if(pages<=1) return;
  bar.appendChild(mkb('←',()=>{pg--;render();scrollTop()},pg===1));
  const s=Math.max(1,pg-2), e=Math.min(pages,pg+2);
  if(s>1){bar.appendChild(mkb(1,()=>{pg=1;render();scrollTop()}));if(s>2)bar.insertAdjacentHTML('beforeend','<span style="color:var(--t3);display:flex;align-items:center;padding:0 4px">…</span>');}
  for(let i=s;i<=e;i++){const ii=i;const b=mkb(i,()=>{pg=ii;render();scrollTop()});if(i===pg)b.classList.add('on');bar.appendChild(b);}
  if(e<pages){if(e<pages-1)bar.insertAdjacentHTML('beforeend','<span style="color:var(--t3);display:flex;align-items:center;padding:0 4px">…</span>');bar.appendChild(mkb(pages,()=>{pg=pages;render();scrollTop()}));}
  bar.appendChild(mkb('→',()=>{pg++;render();scrollTop()},pg===pages));
}
function mkb(t,fn,dis=false){const b=document.createElement('button');b.className='pb';b.textContent=t;b.disabled=dis;b.onclick=fn;return b;}
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}

function setView(v) {
  view=v;
  document.getElementById('vG').classList.toggle('on',v==='grid');
  document.getElementById('vL').classList.toggle('on',v==='list');
  pg=1; render();
}
window.setView=setView;

function clearAll() {
  document.getElementById('hsearch').value='';
  sq=''; activeCat=''; pg=1;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('on'));
  document.querySelector('.cat-pill[data-cat=""]').classList.add('on');
  applyAll();
}
window.clearAll=clearAll;

function x(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── DRAG-TO-SCROLL category bar (mouse + touch) ──────────
(function(){
  const bar = document.querySelector('.cat-bar');
  if(!bar) return;

  let isDown = false;
  let startX, scrollLeft;
  let moved = false;        // track if actually dragged vs just tapped

  // ── MOUSE (desktop drag) ─────────────────
  bar.addEventListener('mousedown', e => {
    isDown = true; moved = false;
    bar.style.cursor = 'grabbing';
    startX    = e.pageX - bar.offsetLeft;
    scrollLeft = bar.scrollLeft;
  });
  bar.addEventListener('mouseleave', () => { isDown = false; bar.style.cursor = 'grab'; });
  bar.addEventListener('mouseup',    () => { isDown = false; bar.style.cursor = 'grab'; });
  bar.addEventListener('mousemove', e => {
    if(!isDown) return;
    e.preventDefault();
    const x    = e.pageX - bar.offsetLeft;
    const walk = x - startX;
    if(Math.abs(walk) > 3) moved = true;
    bar.scrollLeft = scrollLeft - walk;
  });

  // ── TOUCH (mobile swipe) ─────────────────
  let touchStartX = 0, touchScrollLeft = 0, touchMoved = false;

  bar.addEventListener('touchstart', e => {
    touchMoved      = false;
    touchStartX     = e.touches[0].pageX;
    touchScrollLeft = bar.scrollLeft;
  }, { passive: true });

  bar.addEventListener('touchmove', e => {
    const dx = touchStartX - e.touches[0].pageX;
    if(Math.abs(dx) > 4) touchMoved = true;
    bar.scrollLeft = touchScrollLeft + dx;
    // Only prevent default if horizontal movement > vertical
    const dy = Math.abs(e.touches[0].pageY - e.touches[0].screenY);
    if(Math.abs(dx) > dy) e.preventDefault();
  }, { passive: false });

  // Prevent pill click firing if user was dragging
  bar.addEventListener('click', e => {
    if(touchMoved || moved) {
      e.stopPropagation();
      e.preventDefault();
      touchMoved = false; moved = false;
    }
  }, true);
})();
</script>
